<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Toca do Coelho — Checklists</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0EB;--surface:#FFF;--surface-alt:#FAF7F4;--border:#E8E0D8;--text:#2C2520;--text2:#8C7E72;--accent:#C8553D;--green:#4A7C59;--green-l:#EAF3EC;--amber:#C49A2A;--amber-l:#FDF6E3;--blue:#2B7A9E;--blue-l:#E8F4F8;--purple:#8B5CF6;--purple-l:#F0EBFF;--r:12px;--sh:0 1px 3px rgba(44,37,32,.06),0 4px 12px rgba(44,37,32,.04);--sh2:0 4px 16px rgba(44,37,32,.08),0 12px 32px rgba(44,37,32,.06)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent}
.login-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#2C2520,#4A3728)}
.login-card{background:var(--surface);border-radius:20px;padding:48px 36px;width:100%;max-width:380px;box-shadow:var(--sh2);text-align:center}
.login-card .logo-wrap{margin-bottom:28px}.login-card .logo-wrap svg{width:100%;max-width:280px;height:auto}
.ig{margin-bottom:14px;text-align:left}.ig label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.ig input,.ig select,.ig textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;color:var(--text);background:var(--surface-alt);outline:none;transition:border .2s}
.ig input:focus,.ig select:focus,.ig textarea:focus{border-color:var(--accent)}.ig textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-p{background:var(--accent);color:#fff;width:100%;margin-top:8px}.btn-p:hover{background:#b34a34}
.btn-s{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}.btn-s:hover{background:var(--surface-alt)}
.btn-sm{padding:8px 14px;font-size:12px}.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:#3d6a4b}
.btn-d{background:var(--accent);color:#fff}.btn-d:hover{background:#b34a34}.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#236a87}
.login-error{color:var(--accent);font-size:13px;margin-top:12px;display:none}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr .br{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent)}.hdr-r{display:flex;align-items:center;gap:10px}
.badge{font-size:11px;color:var(--text2);background:var(--surface-alt);padding:5px 11px;border-radius:20px;border:1px solid var(--border)}
.btn-i{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .2s;font-size:16px}.btn-i:hover{background:var(--surface-alt);color:var(--text)}
.app{display:none}.app.on{display:block}.main{padding:20px;max-width:600px;margin:0 auto}
.page{display:none}.page.on{display:block}
.date-bar{text-align:center;margin-bottom:20px}.date-bar .dy{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}.date-bar .dt{font-family:'Playfair Display',serif;font-size:22px}
.tabs{display:flex;background:var(--surface);border-radius:var(--r);border:1.5px solid var(--border);padding:4px;margin-bottom:20px}
.tabs button{flex:1;padding:10px;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2);transition:all .25s}
.tabs button.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(200,85,61,.25)}
.prog{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:20px;box-shadow:var(--sh)}
.ring{position:relative;width:56px;height:56px;flex-shrink:0}.ring svg{transform:rotate(-90deg)}.ring .rbg{stroke:var(--border)}.ring .rfill{stroke:var(--green);transition:stroke-dashoffset .5s ease}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.prog h3{font-size:14px;font-weight:600;margin-bottom:2px}.prog p{font-size:12px;color:var(--text2)}
.sc{background:var(--surface);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--sh);overflow:hidden;animation:fi .3s ease both}
.sc:nth-child(2){animation-delay:.04s}.sc:nth-child(3){animation-delay:.08s}.sc:nth-child(4){animation-delay:.12s}.sc:nth-child(5){animation-delay:.16s}
.sc-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;transition:background .2s}.sc-h:hover{background:var(--surface-alt)}
.sc-l{display:flex;align-items:center;gap:10px}.sc-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.sc-nm{font-weight:600;font-size:14px}
.sc-assigned{font-size:10px;color:var(--blue);margin-top:1px}
.sc-cnt{font-size:11px;color:var(--text2);background:var(--surface-alt);padding:3px 9px;border-radius:20px;border:1px solid var(--border);font-weight:500}
.sc-cnt.ok{background:var(--green-l);color:var(--green);border-color:var(--green-l)}
.sc-chv{color:var(--text2);transition:transform .3s;font-size:16px}.sc.open .sc-chv{transform:rotate(180deg)}
.sc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}.sc.open .sc-body{max-height:4000px}
.tk{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s}.tk:hover{background:var(--surface-alt)}.tk.dis{pointer-events:none;opacity:.55}
.ck{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--surface)}
.tk.done .ck{background:var(--green);border-color:var(--green)}.ck svg{opacity:0;transition:opacity .2s}.tk.done .ck svg{opacity:1}
.tk-c{flex:1}.tk-t{font-size:13px;line-height:1.4}.tk.done .tk-t{color:var(--text2);text-decoration:line-through}
.tk-who{font-size:10px;color:var(--green);margin-top:2px;display:none;font-weight:500}.tk.done .tk-who{display:block}
.tk-note{font-size:10px;color:var(--amber);background:var(--amber-l);padding:2px 7px;border-radius:5px;margin-top:3px;display:inline-block}
.fin-s{padding:14px 16px;border-top:1px solid var(--border)}.fin-bar{display:flex;gap:8px}
.fin-bar input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;background:var(--surface-alt);outline:none}.fin-bar input:focus{border-color:var(--green)}
.done-badge{padding:12px 16px;border-top:1px solid var(--border);background:var(--green-l);color:var(--green);font-size:12px;font-weight:600;text-align:center}
/* Panels */
.ov{position:fixed;inset:0;background:rgba(44,37,32,.4);z-index:200;display:none;opacity:0;transition:opacity .25s}.ov.on{display:block;opacity:1}
.pnl{position:fixed;top:0;right:-100%;width:100%;max-width:440px;height:100%;background:var(--bg);z-index:201;transition:right .3s ease;overflow-y:auto}.pnl.on{right:0}
.pnl-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}.pnl-h h2{font-size:17px;font-weight:700}.pnl-b{padding:20px}
/* Cards */
.card{background:var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh)}
.card-t{font-weight:700;font-size:13px;margin-bottom:4px}
.card-v{font-size:24px;font-weight:700;color:var(--accent)}
.card-sub{font-size:11px;color:var(--text2);margin-top:2px}
/* Ranking */
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border-radius:10px;margin-bottom:6px;box-shadow:var(--sh)}
.rank-pos{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rank-1{background:var(--amber-l);color:var(--amber)}.rank-2{background:var(--green-l);color:var(--green)}.rank-3{background:var(--blue-l);color:var(--blue)}.rank-other{background:var(--surface-alt);color:var(--text2)}
.rank-info{flex:1}.rank-name{font-size:13px;font-weight:600}.rank-val{font-size:11px;color:var(--text2)}
.rank-bar{height:6px;background:var(--border);border-radius:3px;margin-top:4px;overflow:hidden}.rank-fill{height:100%;border-radius:3px;transition:width .3s}
/* Attendance */
.att-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);padding:10px 14px;border-radius:10px;margin-bottom:6px;box-shadow:var(--sh)}
.att-name{font-size:13px;font-weight:600}.att-time{font-size:11px;color:var(--green);font-weight:500}
.att-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
/* Shift grid */
.shift-grid{display:grid;grid-template-columns:auto repeat(7,1fr);gap:2px;font-size:11px;margin-bottom:16px}
.shift-grid .sh-head{background:var(--surface);padding:6px 4px;text-align:center;font-weight:600;border-radius:4px;color:var(--text2)}
.shift-grid .sh-name{background:var(--surface);padding:6px 8px;font-weight:500;border-radius:4px;white-space:nowrap}
.shift-grid .sh-cell{background:var(--surface);padding:6px;text-align:center;border-radius:4px;cursor:pointer;transition:background .15s;min-height:32px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2px}
.shift-grid .sh-cell:hover{background:var(--surface-alt)}
.sh-tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:500}
/* Report */
.rpt-card{background:var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);cursor:pointer;transition:background .15s}
.rpt-card:hover{background:var(--surface-alt)}
.rpt-date{font-weight:700;font-size:13px;margin-bottom:3px}.rpt-meta{font-size:11px;color:var(--text2)}
.rpt-bar{height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}.rpt-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.rpt-sectors{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.8}
.rpt-att{font-size:11px;color:var(--blue);margin-top:6px}
.detail-item{background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.detail-item h4{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.detail-task{font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.detail-task:last-child{border:none}.detail-task .who{font-size:11px;color:var(--green);font-weight:500}.detail-task .undone{color:var(--accent);font-weight:500}
/* Admin */
.adm-sec{margin-bottom:24px}.adm-sec h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.u-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);padding:11px 14px;border-radius:10px;margin-bottom:6px;box-shadow:var(--sh)}
.u-row .u-info{font-size:13px;font-weight:500}.u-row .u-role{font-size:11px;color:var(--text2)}.u-row .u-btns{display:flex;gap:4px}
.adm-form{background:var(--surface);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}.adm-form .ig{margin-bottom:10px}
.task-ed{background:var(--surface);padding:9px 12px;border-radius:10px;margin-bottom:5px;box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between;gap:6px}
.task-ed .te-text{flex:1;font-size:12px;line-height:1.4}.task-ed .te-btns{display:flex;gap:4px;flex-shrink:0}
/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav button{flex:1;padding:8px 0 6px;border:none;background:none;font-family:inherit;font-size:9px;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s}
.nav button.on{color:var(--accent)}.nav button svg{width:20px;height:20px}
.spacer{height:72px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(44,37,32,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}.modal{background:var(--surface);border-radius:16px;padding:24px 20px;width:100%;max-width:400px;box-shadow:var(--sh2);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}.modal .ig{margin-bottom:10px}
.modal-btns{display:flex;gap:8px;margin-top:14px}.modal-btns .btn{flex:1}
.sec-title{font-size:16px;font-weight:700;margin-bottom:4px}.sec-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:400px){.login-card{padding:32px 20px}.main{padding:14px}.shift-grid{font-size:10px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="logo-wrap">
<svg viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="680" height="500" rx="28" fill="#2C2520"/>
<rect x="2" y="2" width="676" height="496" rx="27" fill="none" stroke="#C8553D" stroke-width="1" opacity="0.3"/>
<path d="M40 40 L80 40 L80 44 L44 44 L44 80 L40 80 Z" fill="#C8553D" opacity="0.4"/>
<path d="M640 40 L600 40 L600 44 L636 44 L636 80 L640 80 Z" fill="#C8553D" opacity="0.4"/>
<path d="M40 460 L80 460 L80 456 L44 456 L44 420 L40 420 Z" fill="#C8553D" opacity="0.4"/>
<path d="M640 460 L600 460 L600 456 L636 456 L636 420 L640 420 Z" fill="#C8553D" opacity="0.4"/>
<g transform="translate(340, 175)"><ellipse cx="-22" cy="-75" rx="14" ry="48" fill="#C8553D" transform="rotate(-12, -22, -75)"/><ellipse cx="-22" cy="-75" rx="8" ry="38" fill="#4A3728" transform="rotate(-12, -22, -75)"/><ellipse cx="22" cy="-75" rx="14" ry="48" fill="#C8553D" transform="rotate(12, 22, -75)"/><ellipse cx="22" cy="-75" rx="8" ry="38" fill="#4A3728" transform="rotate(12, 22, -75)"/><circle cx="0" cy="-18" r="32" fill="#C8553D"/><circle cx="0" cy="-14" r="22" fill="#D4674F" opacity="0.3"/><ellipse cx="-11" cy="-24" rx="4.5" ry="5.5" fill="#2C2520"/><ellipse cx="11" cy="-24" rx="4.5" ry="5.5" fill="#2C2520"/><circle cx="-9" cy="-26" r="1.5" fill="#F5F0EB" opacity="0.7"/><circle cx="13" cy="-26" r="1.5" fill="#F5F0EB" opacity="0.7"/><ellipse cx="0" cy="-13" rx="4" ry="3" fill="#4A3728"/><path d="M-5 -9 Q0 -4 5 -9" fill="none" stroke="#4A3728" stroke-width="1.5" stroke-linecap="round"/><line x1="-15" y1="-14" x2="-35" y2="-20" stroke="#F5F0EB" stroke-width="0.8" opacity="0.4"/><line x1="-15" y1="-11" x2="-35" y2="-11" stroke="#F5F0EB" stroke-width="0.8" opacity="0.4"/><line x1="15" y1="-14" x2="35" y2="-20" stroke="#F5F0EB" stroke-width="0.8" opacity="0.4"/><line x1="15" y1="-11" x2="35" y2="-11" stroke="#F5F0EB" stroke-width="0.8" opacity="0.4"/><ellipse cx="0" cy="24" rx="28" ry="22" fill="#C8553D"/></g>
<g transform="translate(380, 200)"><circle cx="0" cy="0" r="16" fill="#4A7C59"/><circle cx="0" cy="0" r="14" fill="none" stroke="#EAF3EC" stroke-width="1" opacity="0.3"/><polyline points="-6 0 -2 5 7 -5" fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></g>
<text x="340" y="290" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#F5F0EB" letter-spacing="6" opacity="0.5">CHECKLIST</text>
<text x="340" y="335" text-anchor="middle" font-family="Georgia,serif" font-size="42" fill="#C8553D" font-weight="700" letter-spacing="2">Toca do Coelho</text>
<line x1="220" y1="355" x2="460" y2="355" stroke="#C8553D" stroke-width="0.8" opacity="0.4"/><circle cx="340" cy="355" r="3" fill="#C8553D" opacity="0.5"/>
<text x="340" y="387" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="13" fill="#8C7E72" letter-spacing="4">OPERAÇÕES &amp; CONTROLE</text>
</svg>
    </div>
    <div class="ig"><label>Usuário</label><input type="text" id="loginUser" placeholder="seu usuário" autocomplete="username"></div>
    <div class="ig"><label>Senha</label><input type="password" id="loginPass" placeholder="sua senha" autocomplete="current-password"></div>
    <button class="btn btn-p" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Usuário ou senha inválidos</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">
  <header class="hdr">
    <div class="br">Toca do Coelho</div>
    <div class="hdr-r"><span class="badge" id="userBadge"></span><button class="btn-i" onclick="doLogout()" title="Sair">⏻</button></div>
  </header>
  <div class="main">

    <!-- CHECKLIST -->
    <div class="page on" id="pgCheck">
      <div class="date-bar"><div class="dy" id="dayLbl"></div><div class="dt" id="dateLbl"></div></div>
      <div class="tabs" id="tabBar"><button class="on" onclick="setTab('abertura',this)">☀️ Abertura</button><button onclick="setTab('fechamento',this)">🌙 Fechamento</button></div>
      <div class="prog"><div class="ring"><svg width="56" height="56" viewBox="0 0 64 64"><circle class="rbg" cx="32" cy="32" r="28" fill="none" stroke-width="5"/><circle class="rfill" id="rFill" cx="32" cy="32" r="28" fill="none" stroke-width="5" stroke-linecap="round" stroke-dasharray="175.93" stroke-dashoffset="175.93"/></svg><div class="pct" id="rPct">0%</div></div><div><h3 id="pTitle">Progresso</h3><p id="pSub">0 de 0</p></div></div>
      <div id="sectors"></div>
      <div class="spacer"></div>
    </div>

    <!-- EQUIPE (Ranking + Presença) -->
    <div class="page" id="pgTeam">
      <div class="sec-title">👥 Equipe</div>
      <div class="sec-sub">Presença e desempenho</div>

      <div class="tabs" style="margin-bottom:16px"><button class="on" onclick="showTeamTab('presence',this)">Presença Hoje</button><button onclick="showTeamTab('ranking',this)">Ranking</button><button onclick="showTeamTab('shifts',this)">Escala</button></div>

      <div id="teamPresence"></div>
      <div id="teamRanking" style="display:none"></div>
      <div id="teamShifts" style="display:none"></div>
      <div class="spacer"></div>
    </div>

    <!-- REPORTS -->
    <div class="page" id="pgReport">
      <div class="sec-title">📊 Relatórios</div>
      <div class="sec-sub">Histórico dos últimos dias</div>
      <div class="tabs" style="margin-bottom:16px"><button class="on" onclick="loadReport(7,this)">7 dias</button><button onclick="loadReport(15,this)">15 dias</button><button onclick="loadReport(30,this)">30 dias</button></div>
      <div id="reportList"></div>
      <div class="spacer"></div>
    </div>

    <!-- ADMIN -->
    <div class="page" id="pgAdmin">
      <div class="sec-title">⚙️ Administração</div>
      <div class="sec-sub">Gerenciar equipe e tarefas</div>
      <div class="adm-sec"><h3>👥 Equipe</h3><div id="userList"></div><button class="btn btn-blue btn-sm" style="width:100%;margin-top:8px" onclick="openUserModal()">+ Adicionar Funcionário</button></div>
      <div class="adm-sec"><h3>📋 Tarefas</h3><div class="tabs" style="margin-bottom:10px" id="admTabBar"><button class="on" onclick="admTab='abertura';renderAdmTasks();this.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on'));this.classList.add('on')">Abertura</button><button onclick="admTab='fechamento';renderAdmTasks();this.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on'));this.classList.add('on')">Fechamento</button></div><div id="admTaskList"></div><button class="btn btn-g btn-sm" style="width:100%;margin-top:8px" onclick="openTaskModal()">+ Adicionar Tarefa</button></div>
      <div class="adm-sec"><h3>⚠️ Ações</h3><button class="btn btn-s" style="width:100%;margin-bottom:8px" onclick="resetDay()">🔄 Resetar checklists de hoje</button></div>
      <div class="spacer"></div>
    </div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="on" onclick="goPage('pgCheck',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Checklist</button>
    <button onclick="goPage('pgTeam',this);loadTeam()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Equipe</button>
    <button onclick="goPage('pgReport',this);loadReport(7)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg>Relatórios</button>
    <button id="navAdmin" onclick="goPage('pgAdmin',this);loadAdmin()" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>Admin</button>
  </nav>
</div>

<!-- DETAIL PANEL -->
<div class="ov" id="detailOv" onclick="closeDetail()"></div>
<div class="pnl" id="detailPnl"><div class="pnl-h"><h2 id="detailTitle">Detalhe</h2><button class="btn-i" onclick="closeDetail()">✕</button></div><div class="pnl-b" id="detailBody"></div></div>

<!-- USER MODAL -->
<div class="modal-bg" id="userModal"><div class="modal"><h3 id="umTitle">Funcionário</h3><input type="hidden" id="umId"><div class="ig"><label>Nome</label><input id="umName"></div><div class="ig"><label>Usuário</label><input id="umUser"></div><div class="ig"><label>Senha</label><input id="umPass"></div><div class="ig"><label>Cargo</label><select id="umRole"><option value="operador">Operador</option><option value="gerente">Gerente</option><option value="admin">Admin</option></select></div><div class="ig"><label>Setor</label><select id="umSector"><option value="">Todos</option></select></div><div class="modal-btns"><button class="btn btn-s" onclick="closeUserModal()">Cancelar</button><button class="btn btn-g" onclick="saveUser()">Salvar</button></div></div></div>

<!-- TASK MODAL -->
<div class="modal-bg" id="taskModal"><div class="modal"><h3 id="tmTitle">Tarefa</h3><input type="hidden" id="tmId"><div class="ig"><label>Setor</label><select id="tmSector"></select></div><div class="ig"><label>Descrição</label><textarea id="tmText" rows="2"></textarea></div><div class="ig"><label>Observação</label><input id="tmNote"></div><div class="modal-btns"><button class="btn btn-s" onclick="closeTaskModal()">Cancelar</button><button class="btn btn-g" onclick="saveTask()">Salvar</button></div></div></div>

<!-- SHIFT MODAL -->
<div class="modal-bg" id="shiftModal"><div class="modal"><h3>Definir Escala</h3><div class="ig"><label>Funcionário</label><select id="smUser"></select></div><div id="smGrid" style="margin:12px 0"></div><div class="modal-btns"><button class="btn btn-s" onclick="closeShiftModal()">Cancelar</button><button class="btn btn-g" onclick="saveShifts()">Salvar Escala</button></div></div></div>

<script>
const API=async(u,o)=>{const r=await fetch(u,{headers:{'Content-Type':'application/json'},...o});return r.json();};
let user=null,tab='abertura',sectors=[],admTab='abertura',allUsers=[],allTasks=[],allSectors=[],allShifts=[];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const COLORS={salao:'#4A7C59',cozinha:'#C8553D',copa:'#2B7A9E',banheiro:'#8B5CF6',gourmet:'#C49A2A'};
const BGS={salao:'#EAF3EC',cozinha:'#F9ECEA',copa:'#E8F4F8',banheiro:'#F0EBFF',gourmet:'#FDF6E3'};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// AUTH
async function doLogin(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});if(!r.ok){document.getElementById('loginError').style.display='block';return;}user=await r.json();localStorage.setItem('toca_user',JSON.stringify(user));showApp();}
function doLogout(){user=null;localStorage.removeItem('toca_user');document.getElementById('app').classList.remove('on');document.getElementById('loginScreen').style.display='';document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';document.getElementById('loginError').style.display='none';}
function tryAuto(){const s=localStorage.getItem('toca_user');if(s){user=JSON.parse(s);showApp();}}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').classList.add('on');document.getElementById('userBadge').textContent=user.name;document.getElementById('navAdmin').style.display=(user.role==='admin'||user.role==='gerente')?'':'none';setDate();loadChecklist();}

function goPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');}
function setDate(){const d=new Date(),dias=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'],meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];document.getElementById('dayLbl').textContent=dias[d.getDay()];document.getElementById('dateLbl').textContent=d.getDate()+' de '+meses[d.getMonth()];}
function setTab(t,btn){tab=t;document.querySelectorAll('#tabBar button').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');loadChecklist();}

// CHECKLIST
async function loadChecklist(){sectors=await API('/api/checklist/'+tab);renderChecklist();}
function renderChecklist(){
  const c=document.getElementById('sectors');let td=0,ta=0,html='';
  sectors.forEach(s=>{const done=s.items.filter(i=>i.done).length,total=s.items.length;td+=done;ta+=total;const allDone=done===total&&total>0;
    const assignedStr=s.assignedToday?.length?s.assignedToday.join(', '):'';
    html+=`<div class="sc" id="s-${s.id}"><div class="sc-h" onclick="document.getElementById('s-${s.id}').classList.toggle('open')"><div class="sc-l"><div class="sc-ico" style="background:${s.bg};color:${s.color}">${s.icon}</div><div><span class="sc-nm">${s.name}</span>${assignedStr?`<div class="sc-assigned">📌 ${assignedStr}</div>`:''}</div></div><div style="display:flex;align-items:center;gap:8px"><span class="sc-cnt${allDone?' ok':''}">${done}/${total}</span><span class="sc-chv">▾</span></div></div><div class="sc-body">`;
    s.items.forEach(item=>{html+=`<div class="tk${item.done?' done':''}${s.finalized?' dis':''}" onclick="toggleTask(${item.id},'${s.id}')"><div class="ck"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><polyline points="2.5 7.5 5.5 10.5 11.5 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="tk-c"><div class="tk-t">${item.text}</div>${item.note?`<div class="tk-note">⚠️ ${item.note}</div>`:''}<div class="tk-who">${item.done_at?'✓ '+item.done_at+' — '+item.done_by:''}</div></div></div>`;});
    if(s.finalized)html+=`<div class="done-badge">✓ Finalizado por ${s.finalizedBy} às ${s.finalizedAt}</div>`;
    else if(allDone)html+=`<div class="fin-s"><div class="fin-bar"><input type="text" id="fin-${s.id}" placeholder="Responsável" value="${user.name}"><button class="btn btn-g btn-sm" onclick="event.stopPropagation();doFinalize('${s.id}')">Finalizar</button></div></div>`;
    html+=`</div></div>`;});
  c.innerHTML=html;
  const pct=ta===0?0:Math.round(td/ta*100);document.getElementById('rFill').style.strokeDashoffset=175.93-175.93*pct/100;document.getElementById('rPct').textContent=pct+'%';document.getElementById('pTitle').textContent=tab==='abertura'?'Progresso da Abertura':'Progresso do Fechamento';document.getElementById('pSub').textContent=td+' de '+ta+' tarefas concluídas';
}
async function toggleTask(tid,sid){const s=sectors.find(x=>x.id===sid);if(s?.finalized)return;await API('/api/toggle',{method:'POST',body:JSON.stringify({task_id:tid,tab,user_name:user.name,user_id:user.id})});await loadChecklist();document.getElementById('s-'+sid)?.classList.add('open');}
async function doFinalize(sid){const n=document.getElementById('fin-'+sid)?.value?.trim();if(!n)return;await API('/api/finalize',{method:'POST',body:JSON.stringify({sector_id:sid,tab,finalized_by:n})});toast('Setor finalizado!');loadChecklist();}

// TEAM
function showTeamTab(which,btn){
  btn?.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on'));btn?.classList.add('on');
  document.getElementById('teamPresence').style.display=which==='presence'?'':'none';
  document.getElementById('teamRanking').style.display=which==='ranking'?'':'none';
  document.getElementById('teamShifts').style.display=which==='shifts'?'':'none';
  if(which==='ranking')loadRanking();if(which==='shifts')loadShiftsView();if(which==='presence')loadPresence();
}
async function loadTeam(){loadPresence();}
async function loadPresence(){
  const data=await API('/api/attendance/today');
  const el=document.getElementById('teamPresence');
  if(!data.length){el.innerHTML='<div class="card"><p style="text-align:center;color:var(--text2)">Ninguém fez check-in hoje ainda.</p></div>';return;}
  el.innerHTML='<div style="font-size:13px;font-weight:600;margin-bottom:10px">Presentes hoje — '+data.length+' pessoas</div>'+data.map(a=>`<div class="att-row"><div style="display:flex;align-items:center;gap:10px"><div class="att-dot"></div><span class="att-name">${a.user_name}</span></div><span class="att-time">🕐 ${a.check_in}${a.check_out?' → '+a.check_out:''}</span></div>`).join('');
}
async function loadRanking(){
  const data=await API('/api/ranking?days=7');
  const el=document.getElementById('teamRanking');
  const maxTasks=data.taskRanking[0]?.tasks_done||1;
  let html='<div style="font-size:13px;font-weight:600;margin-bottom:10px">🏆 Ranking de Tarefas (7 dias)</div>';
  if(!data.taskRanking.length)html+='<p style="color:var(--text2);font-size:12px">Sem dados ainda.</p>';
  else data.taskRanking.forEach((r,i)=>{const cls=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';html+=`<div class="rank-row"><div class="rank-pos ${cls}">${i+1}°</div><div class="rank-info"><div class="rank-name">${r.name}</div><div class="rank-val">${r.tasks_done} tarefas concluídas</div><div class="rank-bar"><div class="rank-fill" style="width:${r.tasks_done/maxTasks*100}%;background:${i===0?'var(--amber)':i===1?'var(--green)':'var(--blue)'}"></div></div></div></div>`;});

  html+='<div style="font-size:13px;font-weight:600;margin:20px 0 10px">📋 Setores Finalizados (7 dias)</div>';
  if(!data.finalizationRanking.length)html+='<p style="color:var(--text2);font-size:12px">Sem dados ainda.</p>';
  else data.finalizationRanking.forEach((r,i)=>{html+=`<div class="rank-row"><div class="rank-pos rank-other">${i+1}°</div><div class="rank-info"><div class="rank-name">${r.name}</div><div class="rank-val">${r.sectors_finalized} setores finalizados</div></div></div>`;});

  html+='<div style="font-size:13px;font-weight:600;margin:20px 0 10px">⏰ Quem chega mais cedo</div>';
  if(!data.earlyBird.length)html+='<p style="color:var(--text2);font-size:12px">Sem dados ainda.</p>';
  else data.earlyBird.forEach((r,i)=>{html+=`<div class="rank-row"><div class="rank-pos ${i===0?'rank-1':'rank-other'}">${i+1}°</div><div class="rank-info"><div class="rank-name">${r.name}</div><div class="rank-val">Primeiro check-in: ${r.earliest}</div></div></div>`;});

  html+='<div style="font-size:13px;font-weight:600;margin:20px 0 10px">📅 Presença (7 dias)</div>';
  data.attendanceRanking.forEach((r,i)=>{html+=`<div class="rank-row"><div class="rank-pos rank-other">${r.days_present}d</div><div class="rank-info"><div class="rank-name">${r.name}</div><div class="rank-val">${r.days_present} de 7 dias presente</div></div></div>`;});
  el.innerHTML=html;
}
async function loadShiftsView(){
  allShifts=await API('/api/shifts');allUsers=await API('/api/users');allSectors=await API('/api/sectors');
  const el=document.getElementById('teamShifts');
  const activeUsers=allUsers.filter(u=>u.active);
  let html='<div class="shift-grid"><div class="sh-head"></div>';
  DAYS.forEach(d=>{html+=`<div class="sh-head">${d}</div>`;});
  activeUsers.forEach(u=>{
    html+=`<div class="sh-name">${u.name}</div>`;
    for(let d=0;d<7;d++){
      const shifts=allShifts.filter(s=>s.user_id===u.id&&s.day_of_week===d);
      html+=`<div class="sh-cell">`;
      shifts.forEach(s=>{html+=`<span class="sh-tag" style="background:${BGS[s.sector_id]||'#eee'};color:${COLORS[s.sector_id]||'#666'}">${s.sector_icon}</span>`;});
      html+=`</div>`;
    }
  });
  html+=`</div>`;
  if(user.role==='admin'||user.role==='gerente') html+=`<button class="btn btn-blue btn-sm" style="width:100%" onclick="openShiftModal()">✏️ Editar Escala</button>`;
  el.innerHTML=html;
}

// SHIFT MODAL
function openShiftModal(){
  const sel=document.getElementById('smUser');
  sel.innerHTML=allUsers.filter(u=>u.active).map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  renderShiftGrid();
  document.getElementById('shiftModal').classList.add('on');
}
function closeShiftModal(){document.getElementById('shiftModal').classList.remove('on');}
function renderShiftGrid(){
  const uid=parseInt(document.getElementById('smUser').value);
  const userShifts=allShifts.filter(s=>s.user_id===uid);
  let html='<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Marque os setores para cada dia:</div>';
  allSectors.forEach(sec=>{
    html+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:14px">${sec.icon}</span><span style="font-size:12px;font-weight:500;width:90px">${sec.name}</span>`;
    for(let d=0;d<7;d++){
      const active=userShifts.some(s=>s.sector_id===sec.id&&s.day_of_week===d);
      html+=`<label style="display:flex;align-items:center;justify-content:center;width:32px;height:28px;border-radius:6px;cursor:pointer;font-size:9px;font-weight:600;${active?'background:'+BGS[sec.id]+';color:'+COLORS[sec.id]:'background:var(--surface-alt);color:var(--text2)'}"><input type="checkbox" data-sec="${sec.id}" data-day="${d}" ${active?'checked':''} style="display:none" onchange="this.parentElement.style.background=this.checked?'${BGS[sec.id]}':'var(--surface-alt)';this.parentElement.style.color=this.checked?'${COLORS[sec.id]}':'var(--text2)'">${DAYS[d]}</label>`;
    }
    html+='</div>';
  });
  document.getElementById('smGrid').innerHTML=html;
}
document.getElementById('smUser')?.addEventListener('change',renderShiftGrid);
async function saveShifts(){
  const uid=parseInt(document.getElementById('smUser').value);
  const checks=document.querySelectorAll('#smGrid input[type=checkbox]:checked');
  const assignments=[];checks.forEach(c=>assignments.push({sector_id:c.dataset.sec,day_of_week:parseInt(c.dataset.day)}));
  await API('/api/shifts/bulk',{method:'POST',body:JSON.stringify({user_id:uid,assignments})});
  toast('Escala salva!');closeShiftModal();loadShiftsView();loadChecklist();
}

// REPORTS
async function loadReport(days,btn){if(btn){btn.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}const data=await API('/api/reports?days='+(days||7));const el=document.getElementById('reportList');if(!data.length){el.innerHTML='<p style="text-align:center;color:var(--text2);padding:40px 0">Nenhum dado.</p>';return;}
  let html='';data.forEach(day=>{day.tabs.forEach(t=>{let td=0,ta=0;const secs=t.sectors.map(s=>{td+=s.done;ta+=s.total;return`${s.icon} ${s.name}: ${s.done}/${s.total}${s.finalized?' ✓':''}`;});const pct=ta===0?0:Math.round(td/ta*100);if(ta===0)return;
    const attStr=day.attendance?.length?day.attendance.map(a=>a.user_name).join(', '):'';
    html+=`<div class="rpt-card" onclick="openDetail('${day.date}','${t.tab}')"><div class="rpt-date">${fmtDate(day.date)} — ${t.tab==='abertura'?'☀️ Abertura':'🌙 Fechamento'}</div><div class="rpt-meta">${td}/${ta} tarefas · ${pct}%</div><div class="rpt-bar"><div class="rpt-fill" style="width:${pct}%"></div></div><div class="rpt-sectors">${secs.join('<br>')}</div>${attStr?`<div class="rpt-att">👥 ${attStr}</div>`:''}</div>`;});});
  el.innerHTML=html||'<p style="text-align:center;color:var(--text2);padding:40px 0">Nenhum dado.</p>';}
async function openDetail(date,dtab){document.getElementById('detailTitle').textContent=fmtDate(date)+' — '+(dtab==='abertura'?'☀️ Abertura':'🌙 Fechamento');const data=await API(`/api/reports/${date}/${dtab}`);let html='';data.forEach(s=>{html+=`<div class="detail-item"><h4><span style="font-size:16px">${s.icon}</span> ${s.name}${s.finalized?` <span style="font-size:11px;color:var(--green)">✓ ${s.finalizedBy} ${s.finalizedAt}</span>`:''}</h4>`;s.items.forEach(t=>{html+=`<div class="detail-task"><span>${t.done?'✅':'⬜'} ${t.text}</span>${t.done?`<span class="who">${t.done_by} ${t.done_at}</span>`:'<span class="undone">pendente</span>'}</div>`;});html+='</div>';});document.getElementById('detailBody').innerHTML=html;document.getElementById('detailOv').classList.add('on');document.getElementById('detailPnl').classList.add('on');}
function closeDetail(){document.getElementById('detailOv').classList.remove('on');document.getElementById('detailPnl').classList.remove('on');}
function fmtDate(d){const[y,m,day]=d.split('-');return day+'/'+m+'/'+y;}

// ADMIN
async function loadAdmin(){allUsers=await API('/api/users');allTasks=await API('/api/tasks');allSectors=await API('/api/sectors');renderUsers();renderAdmTasks();}
function renderUsers(){document.getElementById('userList').innerHTML=allUsers.map(u=>`<div class="u-row"><div><div class="u-info">${u.name} <span style="color:var(--text2);font-size:11px">(${u.username})</span></div><div class="u-role">${u.role}${u.sector?' · '+u.sector:''}</div></div><div class="u-btns"><button class="btn btn-sm btn-s" onclick="editUser(${u.id})">✏️</button><button class="btn btn-sm btn-d" onclick="delUser(${u.id})">🗑️</button></div></div>`).join('');}
function renderAdmTasks(){const filtered=allTasks.filter(t=>t.tab===admTab);const el=document.getElementById('admTaskList');const by={};allSectors.forEach(s=>by[s.id]={...s,tasks:[]});filtered.forEach(t=>{if(by[t.sector_id])by[t.sector_id].tasks.push(t);});let html='';Object.values(by).forEach(s=>{if(!s.tasks.length)return;html+=`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;margin-bottom:6px">${s.icon} ${s.name}</div>`;s.tasks.forEach(t=>{html+=`<div class="task-ed"><div class="te-text">${t.text}${t.note?`<br><span style="color:var(--amber);font-size:10px">⚠️ ${t.note}</span>`:''}</div><div class="te-btns"><button class="btn btn-sm btn-s" onclick="editTask(${t.id})">✏️</button><button class="btn btn-sm btn-d" onclick="delTask(${t.id})">🗑️</button></div></div>`;});html+='</div>';});el.innerHTML=html||'<p style="color:var(--text2);font-size:12px">Nenhuma tarefa</p>';}

function openUserModal(u){document.getElementById('umTitle').textContent=u?'Editar':'Novo Funcionário';document.getElementById('umId').value=u?.id||'';document.getElementById('umName').value=u?.name||'';document.getElementById('umUser').value=u?.username||'';document.getElementById('umPass').value='';document.getElementById('umRole').value=u?.role||'operador';const sel=document.getElementById('umSector');sel.innerHTML='<option value="">Todos</option>'+allSectors.map(s=>`<option value="${s.id}"${u?.sector===s.id?' selected':''}>${s.name}</option>`).join('');document.getElementById('userModal').classList.add('on');}
function closeUserModal(){document.getElementById('userModal').classList.remove('on');}
function editUser(id){openUserModal(allUsers.find(u=>u.id===id));}
async function saveUser(){const id=document.getElementById('umId').value;const d={name:document.getElementById('umName').value.trim(),username:document.getElementById('umUser').value.trim(),role:document.getElementById('umRole').value,sector:document.getElementById('umSector').value||null};const p=document.getElementById('umPass').value;if(p)d.password=p;if(!d.name||!d.username)return alert('Preencha nome e usuário');if(id)await API('/api/users/'+id,{method:'PUT',body:JSON.stringify(d)});else{if(!p)return alert('Defina uma senha');d.password=p;await API('/api/users',{method:'POST',body:JSON.stringify(d)});}closeUserModal();toast('Salvo!');loadAdmin();}
async function delUser(id){if(!confirm('Remover?'))return;await API('/api/users/'+id,{method:'DELETE'});toast('Removido');loadAdmin();}

function openTaskModal(t){document.getElementById('tmTitle').textContent=t?'Editar':'Nova Tarefa';document.getElementById('tmId').value=t?.id||'';document.getElementById('tmText').value=t?.text||'';document.getElementById('tmNote').value=t?.note||'';const sel=document.getElementById('tmSector');sel.innerHTML=allSectors.map(s=>`<option value="${s.id}"${t?.sector_id===s.id?' selected':''}>${s.name}</option>`).join('');document.getElementById('taskModal').classList.add('on');}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('on');}
function editTask(id){openTaskModal(allTasks.find(t=>t.id===id));}
async function saveTask(){const id=document.getElementById('tmId').value;const d={sector_id:document.getElementById('tmSector').value,tab:admTab,text:document.getElementById('tmText').value.trim(),note:document.getElementById('tmNote').value.trim()||null};if(!d.text)return alert('Escreva a descrição');if(id)await API('/api/tasks/'+id,{method:'PUT',body:JSON.stringify(d)});else await API('/api/tasks',{method:'POST',body:JSON.stringify(d)});closeTaskModal();toast('Salvo!');loadAdmin();loadChecklist();}
async function delTask(id){if(!confirm('Remover?'))return;await API('/api/tasks/'+id,{method:'DELETE'});toast('Removido');loadAdmin();loadChecklist();}
async function resetDay(){if(!confirm('Resetar checklists de hoje?'))return;await API('/api/reset-day',{method:'POST'});toast('Resetado!');loadChecklist();}

tryAuto();
</script>
