<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Checklist">
  <title>🐰 Toca do Coelho — Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf8f5; --sidebar: #5a0f0f; --accent: #7a1a1a; --accent-light: #fdf3f3;
      --gold: #c9a96e; --success: #16a34a; --success-light: #f0fdf4; --border: #e8e0d8;
      --text: #1c1410; --muted: #8a7060; --card: #ffffff; --font: 'Outfit', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--sidebar); padding: 1rem; }
    .login-card { background: white; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 0.75rem; }
    .login-logo-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 2.2rem; }
    .login-title { text-align: center; font-size: 1.4rem; font-weight: 700; margin-bottom: 0.1rem; color: var(--accent); }
    .login-subtitle { text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--gold); margin-bottom: 0.25rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .login-sub { text-align: center; font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font); font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--accent); }
    .btn-primary { width: 100%; padding: 0.85rem; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: var(--font); font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.88; }
    .login-error { color: #dc2626; font-size: 0.85rem; text-align: center; margin-top: 0.75rem; display: none; }
    .login-hint { font-size: 0.75rem; text-align: center; color: var(--muted); margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
    .login-hint strong { color: var(--text); }

    /* APP SHELL */
    #app { display: none; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: var(--sidebar); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s; }
    .sidebar-logo { padding: 1.5rem 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 0.875rem; }
    .sidebar-logo-icon { width: 42px; height: 42px; border-radius: 50%; background: rgba(201,169,110,0.2); border: 1.5px solid rgba(201,169,110,0.4); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .sidebar-logo-name { font-size: 0.95rem; font-weight: 700; color: white; line-height: 1.2; }
    .sidebar-logo-sub { font-size: 0.68rem; color: var(--gold); opacity: 0.8; margin-top: 1px; }
    .sidebar-nav { flex: 1; padding: 1rem 0.75rem; overflow-y: auto; }
    .nav-section-label { font-size: 0.64rem; font-weight: 700; color: rgba(255,255,255,0.28); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 0.5rem; margin: 1.1rem 0 0.5rem; }
    .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.55); font-size: 0.875rem; font-weight: 500; transition: all 0.15s; margin-bottom: 2px; user-select: none; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
    .nav-item.active { background: rgba(201,169,110,0.25); color: var(--gold); border-left: 3px solid var(--gold); }
    .nav-item-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-badge { margin-left: auto; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
    .nav-badge.ok { background: rgba(22,163,74,0.7); color: white; }
    .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid rgba(255,255,255,0.08); }
    .user-chip { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0.25rem 0.75rem; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; color: white; flex-shrink: 0; }
    .user-name { font-size: 0.85rem; font-weight: 600; color: white; line-height: 1.2; }
    .user-role { font-size: 0.72rem; color: rgba(255,255,255,0.38); }
    .btn-logout { width: 100%; padding: 0.5rem 0.75rem; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.45); border: none; border-radius: 8px; font-family: var(--font); font-size: 0.8rem; cursor: pointer; text-align: left; transition: all 0.15s; }
    .btn-logout:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }

    /* MAIN */
    .main { margin-left: 240px; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.75rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-title { font-size: 1.2rem; font-weight: 700; }
    .topbar-date { font-size: 0.8rem; color: var(--muted); margin-top: 1px; }
    .page-content { padding: 1.75rem; flex: 1; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 1rem 1.25rem; }
    .stat-label { font-size: 0.72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .stat-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }

    /* SECTOR CARDS */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .sector-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 1.25rem; cursor: pointer; transition: all 0.2s; }
    .sector-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.07); }
    .sector-icon { font-size: 1.75rem; margin-bottom: 0.75rem; }
    .sector-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
    .sector-status { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; }
    .progress-bar { height: 5px; background: #e7e5e4; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.4rem; }
    .sector-tags { margin-top: 0.6rem; }
    .sector-tag { display: inline-flex; align-items: center; font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-right: 4px; margin-bottom: 3px; }
    .tag-done { background: #f0fdf4; color: #15803d; }
    .tag-pending { background: #fff7ed; color: #c2410c; }
    .tag-partial { background: #fefce8; color: #a16207; }

    /* CHECKLIST */
    .type-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .type-tab { flex: 1; padding: 0.65rem; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card); font-family: var(--font); font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--muted); }
    .type-tab.active { border-color: var(--accent); background: var(--accent); color: white; }

    .checklist-progress { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1.25rem; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .progress-title { font-size: 0.85rem; font-weight: 600; color: var(--muted); }
    .progress-pct { font-size: 1.3rem; font-weight: 700; }
    .progress-bar-lg { height: 8px; background: #e7e5e4; border-radius: 10px; overflow: hidden; }
    .progress-fill-lg { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
    .completion-note { margin-top: 0.75rem; font-size: 0.8rem; color: var(--success); font-weight: 600; }

    .task-item { display: flex; align-items: flex-start; gap: 0.875rem; padding: 0.875rem 1rem; background: var(--card); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; }
    .task-item:hover { border-color: #c8c5c2; }
    .task-item.done { background: var(--success-light); border-color: #bbf7d0; }
    .task-item.locked { opacity: 0.7; cursor: default; }
    .task-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; }
    .task-item.done .task-checkbox { background: var(--success); border-color: var(--success); }
    .check-icon { color: white; font-size: 0.75rem; display: none; font-weight: 700; }
    .task-item.done .check-icon { display: block; }
    .task-text { flex: 1; font-size: 0.9rem; font-weight: 500; line-height: 1.4; }
    .task-item.done .task-text { color: var(--muted); text-decoration: line-through; }
    .task-time { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    .btn-complete { width: 100%; padding: 0.9rem; background: var(--success); color: white; border: none; border-radius: 12px; font-family: var(--font); font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: all 0.2s; }
    .btn-complete:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-complete:not(:disabled):hover { background: #15803d; }
    .done-banner { text-align: center; padding: 1.25rem; background: var(--success-light); border-radius: 12px; border: 1px solid #bbf7d0; color: var(--success); font-weight: 700; margin-top: 1rem; }

    /* HISTORY */
    .history-item { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 0.9rem 1.25rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 1rem; }
    .history-icon { font-size: 1.4rem; width: 36px; text-align: center; flex-shrink: 0; }
    .history-info { flex: 1; }
    .history-title { font-size: 0.875rem; font-weight: 600; }
    .history-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .history-badge { font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }

    /* ADMIN */
    .admin-section { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.25rem; }
    .admin-section-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .user-list-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
    .user-list-item:last-child { border: none; padding-bottom: 0; }
    .user-list-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; color: white; flex-shrink: 0; }
    .btn-sm { padding: 0.35rem 0.85rem; border-radius: 7px; border: 1px solid var(--border); background: white; font-family: var(--font); font-size: 0.8rem; cursor: pointer; transition: all 0.15s; color: var(--text); }
    .btn-sm:hover { background: #f5f5f4; }
    .btn-sm.danger { color: #dc2626; border-color: #fca5a5; }
    .btn-sm.danger:hover { background: #fef2f2; }
    .input-sm { padding: 0.5rem 0.75rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 0.875rem; outline: none; background: white; color: var(--text); }
    .input-sm:focus { border-color: var(--accent); }
    .inline-form { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: flex-end; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .summary-item { background: var(--bg); border-radius: 10px; padding: 1rem; border: 1px solid var(--border); }
    .summary-item-label { font-size: 0.75rem; color: var(--muted); }
    .summary-item-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.1rem; }

    /* SECTION TITLE */
    .section-title { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; margin-top: 1.75rem; }
    .section-title:first-child { margin-top: 0; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state-text { font-size: 0.95rem; }

    /* TOAST */
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1c1917; color: white; padding: 0.875rem 1.25rem; border-radius: 12px; font-size: 0.9rem; font-weight: 500; z-index: 9999; animation: slideUp 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* OVERLAY */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99; }
    .overlay.show { display: block; }

    /* MOBILE */
    .mobile-menu-btn { display: none; background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 0; line-height: 1; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .mobile-menu-btn { display: block; }
      .page-content { padding: 1rem; }
      .topbar { padding: 0.875rem 1rem; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><div class="login-logo-circle">🐰</div></div>
    <div class="login-title">Toca do Coelho</div>
    <div class="login-subtitle">Restaurante</div>
    <div class="login-sub">Sistema de gestão operacional</div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="login-user" placeholder="Digite seu usuário" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="login()">Entrar</button>
    <div class="login-error" id="login-error">Usuário ou senha incorretos.</div>
    <div class="login-hint">Use seu primeiro nome como usuário.<br>Senha padrão: <strong>1234</strong></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🐰</div>
      <div>
        <div class="sidebar-logo-name">Toca do Coelho</div>
        <div class="sidebar-logo-sub">Gestão Operacional</div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name-display">-</div>
          <div class="user-role" id="user-role-display">-</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">← Sair da conta</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
        <div>
          <div class="topbar-title" id="topbar-title">Dashboard</div>
          <div class="topbar-date" id="topbar-date"></div>
        </div>
      </div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<div class="toast" id="toast" style="display:none"></div>

const KEY = { USERS: 'chk_users', LOGS: 'chk_logs', PROGRESS: 'chk_progress', SESSION: 'chk_session', CONFIG: 'chk_config' }

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def } catch { return def } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)) }

// AUTH

function login() {
  const username = document.getElementById('login-user').value.trim()
  const password = document.getElementById('login-pass').value
  const user = load(KEY.USERS, []).find(u => u.username === username && u.password === password)
  if (user) {
    currentUser = user
    save(KEY.SESSION, { id: user.id })
    document.getElementById('login-error').style.display = 'none'
    showApp()
  } else {
    document.getElementById('login-error').style.display = 'block'
    document.getElementById('login-pass').select()
  }
}

function logout() {
  currentUser = null
  localStorage.removeItem(KEY.SESSION)
  showLogin()
}

function navigate(view, params) {
  params = params || {}
  currentView = view
  viewParams = params

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'))
  if (view === 'checklist') {
    const el = document.querySelector(`.nav-item[data-sector="${params.sectorId}"]`)
    if (el) el.classList.add('active')
  } else {
    const el = document.querySelector(`.nav-item[data-view="${view}"]`)
    if (el) el.classList.add('active')
  }

  document.getElementById('topbar-date').textContent = formatDateBR(new Date())
  const content = document.getElementById('page-content')
  const title   = document.getElementById('topbar-title')

  if (view === 'dashboard') {
    title.textContent = 'Dashboard'
    content.innerHTML = renderDashboard()
  } else if (view === 'checklist') {
    const sector = SECTORS.find(s => s.id === params.sectorId)
    title.textContent = sector ? sector.name : 'Checklist'
    content.innerHTML = renderChecklist(params.sectorId, params.type || 'abertura')
  } else if (view === 'history') {
    title.textContent = 'Histórico'
    content.innerHTML = renderHistory()
  } else if (view === 'admin') {
    title.textContent = 'Administração'
    content.innerHTML = renderAdmin()
  }

  closeSidebar()
  window.scrollTo(0, 0)
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════

function renderDashboard() {
  let totalTasks = 0, doneTasks = 0, completedChecklists = 0, totalChecklists = 0

  SECTORS.forEach(s => {
    ['abertura','fechamento'].forEach(type => {
      const tasks = DEFAULT_TASKS[s.id][type]
      const prog  = getProgress(s.id, type)
      totalTasks += tasks.length
      doneTasks  += prog.done
      totalChecklists++
      if (prog.completed) completedChecklists++
    })
  })

  const overallPct = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0
  const sectorsOK  = SECTORS.filter(s => getProgress(s.id,'abertura').completed && getProgress(s.id,'fechamento').completed).length

  let html = `<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Progresso geral</div>
      <div class="stat-value" style="color:${overallPct===100?'#16a34a':'#ea580c'}">${overallPct}%</div>
      <div class="stat-sub">Hoje</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tarefas concluídas</div>
      <div class="stat-value">${doneTasks}<span style="font-size:1rem;font-weight:400;color:var(--muted)">/${totalTasks}</span></div>
      <div class="stat-sub">No total hoje</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Checklists finalizados</div>
      <div class="stat-value">${completedChecklists}<span style="font-size:1rem;font-weight:400;color:var(--muted)">/${totalChecklists}</span></div>
      <div class="stat-sub">Abertura + fechamento</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Setores completos</div>
      <div class="stat-value" style="color:${sectorsOK===4?'#16a34a':'var(--text)'}">${sectorsOK}<span style="font-size:1rem;font-weight:400;color:var(--muted)">/4</span></div>
      <div class="stat-sub">Abertura + fechamento OK</div>
    </div>
  </div>`

  html += `<div class="section-title">Setores de hoje</div><div class="card-grid">`

  SECTORS.forEach(s => {
    const ab   = getProgress(s.id, 'abertura')
    const fe   = getProgress(s.id, 'fechamento')
    const abL  = DEFAULT_TASKS[s.id].abertura.length
    const feL  = DEFAULT_TASKS[s.id].fechamento.length
    const abPct = Math.round(ab.done / abL * 100)
    const fePct = Math.round(fe.done / feL * 100)
    const total = ab.done + fe.done
    const totalL = abL + feL
    const pct   = Math.round(total / totalL * 100)

    const abTag = ab.completed ? `<span class="sector-tag tag-done">☀️ Abertura ✓</span>` :
                  abPct > 0   ? `<span class="sector-tag tag-partial">☀️ Abertura ${abPct}%</span>` :
                                `<span class="sector-tag tag-pending">☀️ Abertura</span>`
    const feTag = fe.completed ? `<span class="sector-tag tag-done">🌙 Fechamento ✓</span>` :
                  fePct > 0   ? `<span class="sector-tag tag-partial">🌙 Fechamento ${fePct}%</span>` :
                                `<span class="sector-tag tag-pending">🌙 Fechamento</span>`

    html += `<div class="sector-card" onclick="navigate('checklist',{sectorId:'${s.id}'})">
      <div class="sector-icon">${s.icon}</div>
      <div class="sector-name">${s.name}</div>
      <div class="sector-status">${total} de ${totalL} tarefas concluídas</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'#16a34a':s.color}"></div></div>
      <div class="progress-label">${pct}% concluído</div>
      <div class="sector-tags">${abTag}${feTag}</div>
    </div>`
  })

  html += `</div>`

  const logs = load(KEY.LOGS, []).slice(-6).reverse()
  if (logs.length > 0) {
    html += `<div class="section-title">Últimas finalizações</div>`
    logs.forEach(log => {
      const sector = SECTORS.find(s => s.id === log.sectorId)
      html += `<div class="history-item">
        <div class="history-icon">${sector ? sector.icon : '📋'}</div>
        <div class="history-info">
          <div class="history-title">${sector ? sector.name : log.sectorId} — ${log.type === 'abertura' ? '☀️ Abertura' : '🌙 Fechamento'}</div>
          <div class="history-meta">Por ${log.userName} • ${formatDateTimeBR(log.completedAt)}</div>
        </div>
        <span class="history-badge tag-done">✓ Concluído</span>
      </div>`
    })
  }

  return html
}

// ═══════════════════════════════════════
// CHECKLIST
// ═══════════════════════════════════════

function renderChecklist(sectorId, type) {
  const sector = SECTORS.find(s => s.id === sectorId)
  const tasks  = DEFAULT_TASKS[sectorId][type]
  const prog   = getProgress(sectorId, type)
  const pct    = tasks.length > 0 ? Math.round(prog.done / tasks.length * 100) : 0
  const allDone = prog.done === tasks.length

  let html = `<div class="type-tabs">
    <button class="type-tab ${type==='abertura'?'active':''}" onclick="navigate('checklist',{sectorId:'${sectorId}',type:'abertura'})">☀️ Abertura</button>
    <button class="type-tab ${type==='fechamento'?'active':''}" onclick="navigate('checklist',{sectorId:'${sectorId}',type:'fechamento'})">🌙 Fechamento</button>
  </div>
  <div class="checklist-progress">
    <div class="progress-header">
      <span class="progress-title">${tasks.length} tarefa${tasks.length!==1?'s':''} — ${type==='abertura'?'Abertura':'Fechamento'} ${sector?sector.icon:''}</span>
      <span class="progress-pct" style="color:${pct===100?'#16a34a':'#ea580c'}">${pct}%</span>
    </div>
    <div class="progress-bar-lg"><div class="progress-fill-lg" style="width:${pct}%;background:${pct===100?'#16a34a':'#ea580c'}"></div></div>
    ${prog.completed ? `<div class="completion-note">✓ Finalizado por ${prog.completedBy} às ${formatTimeBR(prog.completedAt)}</div>` : ''}
  </div>`

  tasks.forEach(task => {
    const done = prog.completedTasks.includes(task.id)
    const time = prog.taskTimes && prog.taskTimes[task.id]
    html += `<div class="task-item ${done?'done':''} ${prog.completed?'locked':''}" onclick="${prog.completed?'':` toggleTask('${sectorId}','${type}','${task.id}')`}">
      <div class="task-checkbox"><span class="check-icon">✓</span></div>
      <div style="flex:1">
        <div class="task-text">${task.text}</div>
        ${done && time ? `<div class="task-time">✓ marcado às ${formatTimeBR(time)}</div>` : ''}
      </div>
    </div>`
  })

  if (!prog.completed) {
    html += `<button class="btn-complete" ${allDone?'':'disabled'} onclick="markComplete('${sectorId}','${type}')">
      ${allDone ? '✓ Finalizar e assinar checklist' : `Conclua todas as ${tasks.length} tarefas para finalizar`}
    </button>`
  } else {
    html += `<div class="done-banner">✓ Checklist de ${type} finalizado com sucesso!</div>`
  }

  return html
}

function toggleTask(sectorId, type, taskId) {
  const prog = getProgress(sectorId, type)
  if (prog.completed) return
  const idx = prog.completedTasks.indexOf(taskId)
  if (!prog.taskTimes) prog.taskTimes = {}
  if (idx === -1) { prog.completedTasks.push(taskId); prog.taskTimes[taskId] = new Date().toISOString() }
  else            { prog.completedTasks.splice(idx, 1); delete prog.taskTimes[taskId] }
  saveProgress(sectorId, type, prog)
  navigate('checklist', { sectorId, type })
  renderSidebar()
}

function markComplete(sectorId, type) {
  const prog  = getProgress(sectorId, type)
  const tasks = DEFAULT_TASKS[sectorId][type]
  if (prog.done < tasks.length) return
  prog.completed   = true
  prog.completedBy = currentUser.name
  prog.completedAt = new Date().toISOString()
  saveProgress(sectorId, type, prog)

  const logs = load(KEY.LOGS, [])
  logs.push({ id: Date.now(), sectorId, type, date: getTodayKey(), userName: currentUser.name, completedAt: new Date().toISOString(), taskCount: tasks.length })
  save(KEY.LOGS, logs)

  const sector = SECTORS.find(s => s.id === sectorId)
  toast(`✓ ${sector ? sector.name : sectorId} — ${type} finalizado!`)
  navigate('checklist', { sectorId, type })
  renderSidebar()
}

// ═══════════════════════════════════════
// HISTÓRICO
// ═══════════════════════════════════════

function renderHistory() {
  const logs = load(KEY.LOGS, []).slice().reverse()
  if (logs.length === 0) {
    return `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Nenhum checklist finalizado ainda.</div></div>`
  }

  let html = '', lastDate = ''
  logs.forEach(log => {
    const sector = SECTORS.find(s => s.id === log.sectorId)
    const date   = log.date || (log.completedAt ? log.completedAt.slice(0,10) : '')
    if (date !== lastDate) {
      html += `<div class="section-title">${formatDateLabel(date)}</div>`
      lastDate = date
    }
    html += `<div class="history-item">
      <div class="history-icon">${sector ? sector.icon : '📋'}</div>
      <div class="history-info">
        <div class="history-title">${sector ? sector.name : log.sectorId} — ${log.type === 'abertura' ? '☀️ Abertura' : '🌙 Fechamento'}</div>
        <div class="history-meta">Por ${log.userName} • ${formatTimeBR(log.completedAt)} • ${log.taskCount} tarefas</div>
      </div>
      <span class="history-badge tag-done">✓</span>
    </div>`
  })
  return html
}

      <div class="summary-item"><div class="summary-item-label">Usuários cadastrados</div><div class="summary-item-value">${users.length}</div></div>
    </div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">🔄 Reiniciar checklists</div>
    <p style="font-size:0.875rem;color:var(--muted);margin-bottom:1rem">Reinicia o progresso do dia atual. O histórico completo é mantido.</p>
    <button class="btn-sm danger" onclick="resetToday()">🔄 Reiniciar checklists de hoje</button>
  </div>`
}

function addUser() {
  const name     = document.getElementById('new-name').value.trim()
  const username = document.getElementById('new-user').value.trim()
  const password = document.getElementById('new-pass').value
  const role     = document.getElementById('new-role').value
  if (!name || !username || !password) { toast('⚠️ Preencha todos os campos'); return }
  const users = load(KEY.USERS, [])
  if (users.find(u => u.username === username)) { toast('⚠️ Usuário já existe'); return }
  users.push({ id: 'u'+Date.now(), username, password, name, role, color: USER_COLORS[users.length % USER_COLORS.length] })
  save(KEY.USERS, users)
  toast('✓ Usuário adicionado com sucesso!')
  navigate('admin')
  renderSidebar()
}

function deleteUser(id) {
  if (!confirm('Remover este usuário? Esta ação não pode ser desfeita.')) return
  save(KEY.USERS, load(KEY.USERS, []).filter(u => u.id !== id))
  toast('Usuário removido.')
  navigate('admin')
  renderSidebar()
}

function resetToday() {
  if (!confirm('Reiniciar todos os checklists de hoje?\n\nO histórico será mantido, apenas o progresso do dia atual será zerado.')) return
  save(KEY.PROGRESS, load(KEY.PROGRESS, []).filter(p => p.date !== getTodayKey()))
  toast('✓ Checklists do dia reiniciados!')
  navigate('dashboard')
  renderSidebar()
}

// ═══════════════════════════════════════
// PROGRESSO
// ═══════════════════════════════════════

function getProgress(sectorId, type) {
  const today = getTodayKey()
  const all   = load(KEY.PROGRESS, [])
  const found = all.find(p => p.date === today && p.sectorId === sectorId && p.type === type)
  if (found) { found.done = found.completedTasks.length; return found }
  return { date: today, sectorId, type, completedTasks: [], taskTimes: {}, completed: false, done: 0 }
}

function saveProgress(sectorId, type, prog) {
  const today = getTodayKey()
  let all = load(KEY.PROGRESS, [])
  const idx = all.findIndex(p => p.date === today && p.sectorId === sectorId && p.type === type)
  if (idx !== -1) all[idx] = prog; else all.push(prog)
  save(KEY.PROGRESS, all)
}

function getSectorSummary(sectorId) {
  let done = 0, total = 0
  ;['abertura','fechamento'].forEach(type => {
    const tasks = DEFAULT_TASKS[sectorId][type]
    const prog  = getProgress(sectorId, type)
    total += tasks.length
    done  += prog.done
  })
  return { done, total }
}

// ═══════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════

function getTodayKey() { return new Date().toISOString().slice(0, 10) }

function formatDateBR(date) {
  return date.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
}
function formatTimeBR(iso) {
  if (!iso) return ''
  return new Date(iso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
}
function formatDateTimeBR(iso) {
  if (!iso) return ''
  const d = new Date(iso)
  return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
}
function formatDateLabel(dateStr) {
  if (!dateStr) return 'Data desconhecida'
  const today = getTodayKey()
  const d = new Date(today); d.setDate(d.getDate()-1)
  const yesterday = d.toISOString().slice(0,10)
  if (dateStr === today) return 'Hoje'
  if (dateStr === yesterday) return 'Ontem'
  const [y, m, day] = dateStr.split('-').map(Number)
  return new Date(y, m-1, day).toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' })
}

let toastTimer
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.style.display = 'block'
  el.style.animation = 'none'; void el.offsetWidth; el.style.animation = ''
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => { el.style.display = 'none' }, 3000)
}

document.addEventListener('DOMContentLoaded', () => {
  const passEl = document.getElementById('login-pass')
  const userEl = document.getElementById('login-user')
  if (passEl) passEl.addEventListener('keypress', e => { if (e.key === 'Enter') login() })
  if (userEl) userEl.addEventListener('keypress', e => { if (e.key === 'Enter') passEl.focus() })
  init()
})
