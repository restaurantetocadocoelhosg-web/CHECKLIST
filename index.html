<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Toca do Coelho — Checklists</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0EB;--surface:#FFF;--surface-alt:#FAF7F4;--border:#E8E0D8;--text:#2C2520;--text-secondary:#8C7E72;--accent:#C8553D;--green:#4A7C59;--green-light:#EAF3EC;--amber:#C49A2A;--amber-light:#FDF6E3;--radius:12px;--shadow:0 1px 3px rgba(44,37,32,.06),0 4px 12px rgba(44,37,32,.04);--shadow-lg:0 4px 16px rgba(44,37,32,.08),0 12px 32px rgba(44,37,32,.06)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent}
.login-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#2C2520,#4A3728)}.login-card{background:var(--surface);border-radius:20px;padding:48px 36px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);text-align:center}.login-card .brand{font-family:'Playfair Display',serif;font-size:28px;color:var(--accent);margin-bottom:4px}.login-card .subtitle{font-size:13px;color:var(--text-secondary);margin-bottom:36px;letter-spacing:1px;text-transform:uppercase}
.input-group{margin-bottom:16px;text-align:left}.input-group label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}.input-group input,.input-group select{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:15px;color:var(--text);background:var(--surface-alt);transition:border-color .2s;outline:none}.input-group input:focus,.input-group select:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}.btn-primary{background:var(--accent);color:#fff;width:100%;margin-top:8px}.btn-primary:hover{background:#b34a34}.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}.btn-secondary:hover{background:var(--surface-alt)}.btn-small{padding:10px 18px;font-size:13px}.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#3d6a4b}.btn-danger{background:var(--accent);color:#fff}.btn-danger:hover{background:#b34a34}
.login-error{color:var(--accent);font-size:13px;margin-top:12px;display:none}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.app-header .brand-sm{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent)}.header-right{display:flex;align-items:center;gap:12px}.user-badge{font-size:12px;color:var(--text-secondary);background:var(--surface-alt);padding:6px 12px;border-radius:20px;border:1px solid var(--border)}
.btn-icon{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);transition:all .2s}.btn-icon:hover{background:var(--surface-alt);color:var(--text)}
.app-container{display:none}.app-container.active{display:block}.main-content{padding:20px;max-width:600px;margin:0 auto}
.date-bar{text-align:center;margin-bottom:24px}.date-bar .today{font-size:13px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}.date-bar .date{font-family:'Playfair Display',serif;font-size:22px}
.tab-switch{display:flex;background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:4px;margin-bottom:24px}.tab-switch button{flex:1;padding:12px;border:none;border-radius:9px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--text-secondary);transition:all .25s}.tab-switch button.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(200,85,61,.25)}
.progress-ring{display:flex;align-items:center;gap:16px;background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:24px;box-shadow:var(--shadow)}.ring-visual{position:relative;width:64px;height:64px;flex-shrink:0}.ring-visual svg{transform:rotate(-90deg)}.ring-visual .ring-bg{stroke:var(--border)}.ring-visual .ring-fill{stroke:var(--green);transition:stroke-dashoffset .5s ease}.ring-percent{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}.progress-info h3{font-size:15px;font-weight:600;margin-bottom:2px}.progress-info p{font-size:13px;color:var(--text-secondary)}
.sector-card{background:var(--surface);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden;animation:fadeIn .3s ease both}.sector-card:nth-child(2){animation-delay:.05s}.sector-card:nth-child(3){animation-delay:.1s}.sector-card:nth-child(4){animation-delay:.15s}.sector-card:nth-child(5){animation-delay:.2s}
.sector-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;cursor:pointer;user-select:none;transition:background .2s}.sector-header:hover{background:var(--surface-alt)}.sector-left{display:flex;align-items:center;gap:12px}.sector-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}.sector-name{font-weight:600;font-size:15px}
.sector-count{font-size:12px;color:var(--text-secondary);background:var(--surface-alt);padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-weight:500}.sector-count.done{background:var(--green-light);color:var(--green);border-color:var(--green-light)}
.sector-chevron{color:var(--text-secondary);transition:transform .3s;font-size:18px}.sector-card.open .sector-chevron{transform:rotate(180deg)}.sector-tasks{max-height:0;overflow:hidden;transition:max-height .35s ease}.sector-card.open .sector-tasks{max-height:3000px}
.task-item{display:flex;align-items:flex-start;gap:14px;padding:14px 20px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s}.task-item:hover{background:var(--surface-alt)}.task-item.disabled{pointer-events:none;opacity:.6}
.task-checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--surface)}.task-item.checked .task-checkbox{background:var(--green);border-color:var(--green)}.task-checkbox svg{opacity:0;transition:opacity .2s}.task-item.checked .task-checkbox svg{opacity:1}
.task-content{flex:1}.task-text{font-size:14px;line-height:1.5}.task-item.checked .task-text{color:var(--text-secondary);text-decoration:line-through}.task-time{font-size:11px;color:var(--text-secondary);margin-top:3px;display:none}.task-item.checked .task-time{display:block}.task-note{font-size:11px;color:var(--amber);background:var(--amber-light);padding:3px 8px;border-radius:6px;margin-top:4px;display:inline-block}
.finalize-section{padding:16px 20px;border-top:1px solid var(--border)}.finalize-bar{display:flex;gap:10px}.finalize-bar input{flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;background:var(--surface-alt);outline:none}.finalize-bar input:focus{border-color:var(--green)}
.sector-done-badge{padding:14px 20px;border-top:1px solid var(--border);background:var(--green-light);color:var(--green);font-size:13px;font-weight:600;text-align:center}
.panel-overlay{position:fixed;inset:0;background:rgba(44,37,32,.4);z-index:200;display:none;opacity:0;transition:opacity .25s}.panel-overlay.active{display:block;opacity:1}.slide-panel{position:fixed;top:0;right:-100%;width:100%;max-width:420px;height:100%;background:var(--bg);z-index:201;transition:right .3s ease;overflow-y:auto}.slide-panel.active{right:0}.panel-header{display:flex;align-items:center;justify-content:space-between;padding:20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}.panel-header h2{font-size:18px;font-weight:700}.panel-body{padding:20px}
.history-entry{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}.history-entry .he-date{font-weight:700;font-size:14px;margin-bottom:4px}.history-entry .he-meta{font-size:12px;color:var(--text-secondary);margin-bottom:8px}.history-entry .he-tasks{font-size:13px;color:var(--text-secondary)}
.admin-section{margin-bottom:24px}.admin-section h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}.user-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);padding:14px 16px;border-radius:10px;margin-bottom:8px;box-shadow:var(--shadow)}.user-row .ur-info{font-size:14px;font-weight:500}.user-row .ur-role{font-size:12px;color:var(--text-secondary)}.add-user-form{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}.add-user-form .input-group{margin-bottom:12px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}.bottom-nav button{flex:1;padding:12px 0 10px;border:none;background:none;font-family:inherit;font-size:11px;color:var(--text-secondary);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}.bottom-nav button.active{color:var(--accent)}.bottom-nav button svg{width:22px;height:22px}.content-spacer{height:80px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:400px){.login-card{padding:36px 24px}.main-content{padding:16px}}
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="brand">Toca do Coelho</div>
    <div class="subtitle">Checklists Operacionais</div>
    <div class="input-group"><label>Usuário</label><input type="text" id="loginUser" placeholder="seu usuário" autocomplete="username"></div>
    <div class="input-group"><label>Senha</label><input type="password" id="loginPass" placeholder="sua senha" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Usuário ou senha inválidos</div>
  </div>
</div>
<div id="appContainer" class="app-container">
  <header class="app-header">
    <div class="brand-sm">Toca do Coelho</div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="btn-icon" onclick="doLogout()" title="Sair"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 1H3a2 2 0 00-2 2v12a2 2 0 002 2h6M13 13l4-4m0 0l-4-4m4 4H5"/></svg></button>
    </div>
  </header>
  <main class="main-content">
    <div class="date-bar"><div class="today" id="dayLabel"></div><div class="date" id="dateLabel"></div></div>
    <div class="tab-switch">
      <button class="active" onclick="switchTab('abertura',this)">☀️ Abertura</button>
      <button onclick="switchTab('fechamento',this)">🌙 Fechamento</button>
    </div>
    <div class="progress-ring">
      <div class="ring-visual">
        <svg width="64" height="64" viewBox="0 0 64 64"><circle class="ring-bg" cx="32" cy="32" r="28" fill="none" stroke-width="5"/><circle class="ring-fill" id="ringFill" cx="32" cy="32" r="28" fill="none" stroke-width="5" stroke-linecap="round" stroke-dasharray="175.93" stroke-dashoffset="175.93"/></svg>
        <div class="ring-percent" id="ringPercent">0%</div>
      </div>
      <div class="progress-info"><h3 id="progressTitle">Progresso da Abertura</h3><p id="progressSub">0 de 0 tarefas</p></div>
    </div>
    <div id="sectorsContainer"></div>
    <div class="content-spacer"></div>
  </main>
  <nav class="bottom-nav">
    <button class="active" onclick="showMain(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Checklist</button>
    <button onclick="openHistory(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Histórico</button>
    <button id="adminNavBtn" onclick="openAdmin(this)" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>Admin</button>
  </nav>
</div>
<div class="panel-overlay" id="historyOverlay" onclick="closeHistory()"></div>
<div class="slide-panel" id="historyPanel"><div class="panel-header"><h2>Histórico</h2><button class="btn-icon" onclick="closeHistory()">✕</button></div><div class="panel-body" id="historyBody"></div></div>
<div class="panel-overlay" id="adminOverlay" onclick="closeAdmin()"></div>
<div class="slide-panel" id="adminPanel"><div class="panel-header"><h2>Administração</h2><button class="btn-icon" onclick="closeAdmin()">✕</button></div><div class="panel-body" id="adminBody"></div></div>

<script>
const SECTORS=[
  {id:'salao',name:'Salão',icon:'🪑',color:'#4A7C59',bg:'#EAF3EC'},
  {id:'cozinha',name:'Cozinha',icon:'🍳',color:'#C8553D',bg:'#F9ECEA'},
  {id:'copa',name:'Copa',icon:'🥤',color:'#2B7A9E',bg:'#E8F4F8'},
  {id:'banheiro',name:'Banheiro',icon:'🚿',color:'#8B5CF6',bg:'#F0EBFF'},
  {id:'gourmet',name:'Área Gourmet',icon:'🍽️',color:'#C49A2A',bg:'#FDF6E3'},
];

const DEFAULT_TASKS={
  abertura:{
    salao:[
      {text:'Ligar disjuntor 1 e 2 para iluminação'},
      {text:'Abrir portas de vidro, portas de ferro e retirar a barra de ferro'},
      {text:'Colocar tapete e bandeira para fora'},
      {text:'Verificar se precisa lavar a calçada e molhar as plantas'},
      {text:'Limpeza do salão — varrer e passar pano'},
      {text:'Higienizar mesas e cadeiras'},
      {text:'Organizar e repor guardanapos, sal, açúcar e palito'},
      {text:'Ligar TV no volume 30, opção pendrive'},
      {text:'Verificar se as máquinas de cartão estão carregadas'},
      {text:'Ligar computador do caixa'},
      {text:'Verificar valor na balança e no sistema'},
    ],
    cozinha:[
      {text:'Ligar gás'},
      {text:'Ligar disjuntores: forno, exaustor e fritadeira'},
      {text:'Colocar lixo para fora',note:'Seg, Qua, Sex e Dom'},
      {text:'Verificar temperatura dos freezers'},
      {text:'Higienizar bancadas e mesas para produção'},
      {text:'Organizar a praça e separar mise en place completa'},
      {text:'Verificar forno e fritadeira para produção'},
      {text:'Ligar exaustores quando começar a produzir'},
    ],
    copa:[
      {text:'Verificar gelo e repor as cubas'},
      {text:'Verificar e repor frutas'},
      {text:'Separar as frutas do dia para sucos'},
      {text:'Higienizar pratos e talheres'},
      {text:'Higienizar e organizar a copa'},
      {text:'Verificar tara da balança'},
      {text:'Verificar preço do sistema'},
    ],
    banheiro:[
      {text:'Higienizar vaso e mictório'},
      {text:'Verificar e repor papel higiênico'},
      {text:'Verificar e repor papel toalha'},
      {text:'Verificar e repor sabonete'},
      {text:'Higienizar pia de mármore'},
      {text:'Verificar e esvaziar lixeiras'},
    ],
    gourmet:[
      {text:'Ligar disjuntores 1, 2 e 3 de cima e o do meio de baixo',note:'Meio = buffet · Cima = luz / rechaud / saladeira'},
      {text:'Limpar todos os rechauds com esponja e sabão'},
      {text:'Limpar buffet frio e quente'},
      {text:'Higienizar saladeiras'},
      {text:'Verificar e repor molhos'},
      {text:'Verificar nível de água em todos os rechauds e buffet'},
    ],
  },
  fechamento:{
    salao:[
      {text:'Limpar e higienizar todas as mesas e cadeiras'},
      {text:'Varrer e passar pano no salão'},
      {text:'Recolher guardanapos, sal, açúcar e palito das mesas'},
      {text:'Desligar TV'},
      {text:'Conferir máquinas de cartão no carregador'},
      {text:'Fechar caixa no sistema e desligar computador'},
      {text:'Recolher tapete e bandeira'},
      {text:'Fechar portas de vidro, portas de ferro e colocar barra de ferro'},
      {text:'Desligar disjuntor 1 e 2 da iluminação'},
      {text:'Verificar se não ficaram pertences de clientes'},
    ],
    cozinha:[
      {text:'Desligar forno, fritadeira e exaustores'},
      {text:'Desligar gás'},
      {text:'Limpar e higienizar bancadas, mesas e equipamentos'},
      {text:'Armazenar sobras corretamente — etiquetar com data'},
      {text:'Verificar se freezers estão fechados e na temperatura correta'},
      {text:'Retirar lixo da cozinha'},
      {text:'Lavar piso da cozinha'},
      {text:'Desligar disjuntores: forno, exaustor e fritadeira'},
    ],
    copa:[
      {text:'Guardar frutas na geladeira'},
      {text:'Higienizar e guardar todos os pratos e talheres'},
      {text:'Limpar e secar bancadas da copa'},
      {text:'Descartar gelo restante e limpar cubas'},
      {text:'Limpar e organizar a copa para o dia seguinte'},
      {text:'Retirar lixo da copa'},
    ],
    banheiro:[
      {text:'Higienizar vaso e mictório'},
      {text:'Limpar pia de mármore e espelhos'},
      {text:'Verificar e repor papel higiênico para o dia seguinte'},
      {text:'Verificar e repor papel toalha'},
      {text:'Verificar e repor sabonete'},
      {text:'Esvaziar e limpar lixeiras'},
      {text:'Passar pano no piso do banheiro'},
    ],
    gourmet:[
      {text:'Desligar todos os rechauds e buffet'},
      {text:'Limpar e secar todos os rechauds'},
      {text:'Limpar buffet frio e quente'},
      {text:'Higienizar e guardar saladeiras'},
      {text:'Guardar molhos na geladeira'},
      {text:'Esvaziar e limpar água dos rechauds'},
      {text:'Desligar disjuntores 1, 2 e 3 de cima e o do meio de baixo'},
    ],
  },
};

let currentUser=null,currentTab='abertura';

function getDB(){
  const raw=localStorage.getItem('toca_v2');
  if(!raw)return initDB();
  const db=JSON.parse(raw);
  const today=new Date().toISOString().slice(0,10);
  if(db.currentDate!==today){archiveDay(db);db.currentDate=today;db.checklist=buildFresh(db.tasks||DEFAULT_TASKS);saveDB(db);}
  return db;
}
function initDB(){
  const db={users:[
    {username:'admin',password:'admin123',role:'admin',name:'Administrador'},
    {username:'gerente',password:'gerente123',role:'gerente',name:'Gerente'},
    {username:'operador',password:'op123',role:'operador',name:'Operador'},
  ],tasks:JSON.parse(JSON.stringify(DEFAULT_TASKS)),currentDate:new Date().toISOString().slice(0,10),checklist:null,history:[]};
  db.checklist=buildFresh(db.tasks);saveDB(db);return db;
}
function saveDB(db){localStorage.setItem('toca_v2',JSON.stringify(db));}
function buildFresh(tasks){
  const cl={};
  ['abertura','fechamento'].forEach(tab=>{cl[tab]={};SECTORS.forEach(s=>{
    const list=tasks[tab][s.id]||[];
    cl[tab][s.id]={items:list.map((t,i)=>({id:i,text:typeof t==='string'?t:t.text,note:typeof t==='object'?(t.note||null):null,done:false,time:null,by:null})),finalized:false,finalizedBy:null,finalizedAt:null};
  });});return cl;
}
function archiveDay(db){if(!db.checklist)return;db.history.unshift({date:db.currentDate,checklist:JSON.parse(JSON.stringify(db.checklist))});if(db.history.length>90)db.history=db.history.slice(0,90);}

function doLogin(){
  const u=document.getElementById('loginUser').value.trim().toLowerCase(),p=document.getElementById('loginPass').value,db=getDB();
  const user=db.users.find(x=>x.username===u&&x.password===p);
  if(!user){document.getElementById('loginError').style.display='block';return;}
  currentUser=user;localStorage.setItem('toca_sess',JSON.stringify(user));showApp();
}
function doLogout(){currentUser=null;localStorage.removeItem('toca_sess');document.getElementById('appContainer').classList.remove('active');document.getElementById('loginScreen').style.display='';document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';document.getElementById('loginError').style.display='none';}
function tryAutoLogin(){const s=localStorage.getItem('toca_sess');if(s){const u=JSON.parse(s),db=getDB(),v=db.users.find(x=>x.username===u.username);if(v){currentUser=v;showApp();}}}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('appContainer').classList.add('active');document.getElementById('userBadge').textContent=currentUser.name;document.getElementById('adminNavBtn').style.display=currentUser.role==='admin'?'':'none';setDate();render();}

function setDate(){const d=new Date(),dias=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'],meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];document.getElementById('dayLabel').textContent=dias[d.getDay()];document.getElementById('dateLabel').textContent=d.getDate()+' de '+meses[d.getMonth()];}

function switchTab(tab,btn){currentTab=tab;document.querySelectorAll('.tab-switch button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function render(){
  const db=getDB(),cl=db.checklist[currentTab],c=document.getElementById('sectorsContainer');
  let td=0,ta=0,html='';
  SECTORS.forEach(s=>{
    const sec=cl[s.id],done=sec.items.filter(i=>i.done).length,total=sec.items.length;
    td+=done;ta+=total;const allDone=done===total&&total>0;
    html+=`<div class="sector-card" id="sector-${s.id}"><div class="sector-header" onclick="toggleSector('${s.id}')"><div class="sector-left"><div class="sector-icon" style="background:${s.bg};color:${s.color}">${s.icon}</div><span class="sector-name">${s.name}</span></div><div style="display:flex;align-items:center;gap:10px"><span class="sector-count${allDone?' done':''}">${done}/${total}</span><span class="sector-chevron">▾</span></div></div><div class="sector-tasks">`;
    sec.items.forEach((item,idx)=>{
      html+=`<div class="task-item${item.done?' checked':''}${sec.finalized?' disabled':''}" onclick="toggle('${s.id}',${idx})"><div class="task-checkbox"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2.5 7.5 5.5 10.5 11.5 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="task-content"><div class="task-text">${item.text}</div>${item.note?`<div class="task-note">⚠️ ${item.note}</div>`:''}<div class="task-time">${item.time?'✓ '+item.time+(item.by?' — '+item.by:''):''}</div></div></div>`;
    });
    if(sec.finalized)html+=`<div class="sector-done-badge">✓ Finalizado por ${sec.finalizedBy} às ${sec.finalizedAt}</div>`;
    else if(allDone)html+=`<div class="finalize-section"><div class="finalize-bar"><input type="text" id="fin-${s.id}" placeholder="Nome do responsável" value="${currentUser.name}"><button class="btn btn-green btn-small" onclick="event.stopPropagation();finalize('${s.id}')">Finalizar</button></div></div>`;
    html+=`</div></div>`;
  });
  c.innerHTML=html;
  const pct=ta===0?0:Math.round(td/ta*100),off=175.93-175.93*pct/100;
  document.getElementById('ringFill').style.strokeDashoffset=off;
  document.getElementById('ringPercent').textContent=pct+'%';
  document.getElementById('progressTitle').textContent=currentTab==='abertura'?'Progresso da Abertura':'Progresso do Fechamento';
  document.getElementById('progressSub').textContent=td+' de '+ta+' tarefas concluídas';
}

function toggleSector(id){document.getElementById('sector-'+id).classList.toggle('open');}
function toggle(sid,idx){
  const db=getDB(),sec=db.checklist[currentTab][sid];if(sec.finalized)return;
  const item=sec.items[idx];item.done=!item.done;
  if(item.done){item.time=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});item.by=currentUser.name;}else{item.time=null;item.by=null;}
  saveDB(db);render();document.getElementById('sector-'+sid).classList.add('open');
}
function finalize(sid){
  const name=document.getElementById('fin-'+sid).value.trim();if(!name)return;
  const db=getDB(),sec=db.checklist[currentTab][sid];
  sec.finalized=true;sec.finalizedBy=name;sec.finalizedAt=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  saveDB(db);render();
}

function openHistory(btn){
  setNav(btn);const db=getDB();let html='';
  if(!db.history.length)html='<p style="color:var(--text-secondary);text-align:center;padding:40px 0">Nenhum registro ainda.</p>';
  else db.history.forEach(e=>{['abertura','fechamento'].forEach(tab=>{let td=0,ta=0;const det=[];
    SECTORS.forEach(s=>{const sec=e.checklist[tab]?.[s.id];if(!sec)return;const d=sec.items.filter(i=>i.done).length,t=sec.items.length;td+=d;ta+=t;det.push(s.icon+' '+s.name+': '+d+'/'+t+(sec.finalized?' ✓':''));});
    html+=`<div class="history-entry"><div class="he-date">${fmtDate(e.date)} — ${tab==='abertura'?'☀️ Abertura':'🌙 Fechamento'}</div><div class="he-meta"><span style="color:var(--green);font-weight:600">${td}/${ta}</span> tarefas</div><div class="he-tasks">${det.join('<br>')}</div></div>`;
  });});
  document.getElementById('historyBody').innerHTML=html;
  document.getElementById('historyOverlay').classList.add('active');document.getElementById('historyPanel').classList.add('active');
}
function closeHistory(){document.getElementById('historyOverlay').classList.remove('active');document.getElementById('historyPanel').classList.remove('active');setNav(document.querySelector('.bottom-nav button'));}
function fmtDate(d){const[y,m,day]=d.split('-');return day+'/'+m+'/'+y;}

function openAdmin(btn){
  if(currentUser.role!=='admin')return;setNav(btn);const db=getDB();
  let html='<div class="admin-section"><h3>Usuários</h3>';
  db.users.forEach((u,i)=>{html+=`<div class="user-row"><div><div class="ur-info">${u.name} (${u.username})</div><div class="ur-role">${u.role}</div></div>${u.username!=='admin'?`<button class="btn btn-small btn-danger" onclick="rmUser(${i})">Remover</button>`:''}</div>`;});
  html+=`</div><div class="admin-section"><h3>Adicionar Usuário</h3><div class="add-user-form"><div class="input-group"><label>Nome</label><input id="newName" placeholder="Nome completo"></div><div class="input-group"><label>Usuário</label><input id="newUser" placeholder="login"></div><div class="input-group"><label>Senha</label><input id="newPass" placeholder="senha"></div><div class="input-group"><label>Cargo</label><select id="newRole"><option value="operador">Operador</option><option value="gerente">Gerente</option><option value="admin">Admin</option></select></div><button class="btn btn-green" style="width:100%" onclick="addUser()">Adicionar</button></div></div>`;
  html+=`<div class="admin-section"><h3>Ações</h3><button class="btn btn-secondary" style="width:100%;margin-bottom:10px" onclick="resetDay()">🔄 Resetar checklists de hoje</button><button class="btn btn-danger" style="width:100%" onclick="if(confirm('Apagar TODOS os dados?'))resetAll()">🗑️ Apagar todos os dados</button></div>`;
  document.getElementById('adminBody').innerHTML=html;
  document.getElementById('adminOverlay').classList.add('active');document.getElementById('adminPanel').classList.add('active');
}
function closeAdmin(){document.getElementById('adminOverlay').classList.remove('active');document.getElementById('adminPanel').classList.remove('active');setNav(document.querySelector('.bottom-nav button'));}
function addUser(){
  const n=document.getElementById('newName').value.trim(),u=document.getElementById('newUser').value.trim().toLowerCase(),p=document.getElementById('newPass').value,r=document.getElementById('newRole').value;
  if(!n||!u||!p)return alert('Preencha todos os campos');const db=getDB();if(db.users.find(x=>x.username===u))return alert('Usuário já existe');
  db.users.push({username:u,password:p,role:r,name:n});saveDB(db);openAdmin(document.getElementById('adminNavBtn'));
}
function rmUser(i){if(!confirm('Remover este usuário?'))return;const db=getDB();db.users.splice(i,1);saveDB(db);openAdmin(document.getElementById('adminNavBtn'));}
function resetDay(){if(!confirm('Resetar todos os checklists de hoje?'))return;const db=getDB();db.checklist=buildFresh(db.tasks);saveDB(db);closeAdmin();render();}
function resetAll(){localStorage.removeItem('toca_v2');doLogout();}
function setNav(btn){document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');}
function showMain(btn){setNav(btn);closeHistory();closeAdmin();}
tryAutoLogin();
</script>
</body>
</html>
